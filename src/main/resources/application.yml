spring:
  application:
    name: commerce

  datasource:
    url: jdbc:mysql://localhost:3306/commerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: commerce
    password: commerce
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 스키마는 Flyway가 관리한다. 엔티티와 실제 스키마 불일치 시 부팅 실패(= 마이그레이션 작성 강제).
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    org.hibernate.SQL: debug
    # 바인딩 파라미터까지 보려면 주석 해제 (매우 verbose)
    # org.hibernate.orm.jdbc.bind: trace
